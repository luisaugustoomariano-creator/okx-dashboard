<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Trade Bot Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 10px;
    }

    .start { background: #22c55e; }
    .stop { background: #ef4444; }
  </style>
</head>

<body>

  <h1>🚀 Trade Bot Dashboard</h1>

  <div class="card">
    <p>Saldo: <span id="balance">--</span></p>
    <p>PNL: <span id="pnl">--</span></p>
    <p>Status: <span id="status">--</span></p>
  </div>

  <div class="card">
    <button class="start" onclick="startBot()">Start</button>
    <button class="stop" onclick="stopBot()">Stop</button>
  </div>

  <div class="card">
    <h3>Logs</h3>
    <ul id="logs"></ul>
  </div>

 <script>
  const API = "https://just-peace-production.up.railway.app";

  function formatUSD(value) {
    if (value === null || value === undefined) return "--";

    return new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: 'USD'
    }).format(value);
  }

  async function loadDashboard() {
    const res = await fetch(API + "/dashboard");
    const data = await res.json();

    document.getElementById("balance").innerText = formatUSD(data.balance);
    const pnlElement = document.getElementById("pnl");
pnlElement.innerText = formatUSD(data.pnl);

if (data.pnl > 0) {
  pnlElement.style.color = "#22c55e"; // verde
} else if (data.pnl < 0) {
  pnlElement.style.color = "#ef4444"; // vermelho
} else {
  pnlElement.style.color = "white";
}
    document.getElementById("status").innerText = data.status;
  }

  async function loadLogs() {
    const res = await fetch(API + "/logs");
    const logs = await res.json();

    const list = document.getElementById("logs");
    list.innerHTML = "";

    logs.forEach(log => {
      const li = document.createElement("li");

      const pnlFormatted = formatUSD(log.pnl);

      li.innerText = `${log.pair} | ${log.action} | ${pnlFormatted}`;
      list.appendChild(li);
    });
  }

  async function startBot() {
    await fetch(API + "/bot/start", { method: "POST" });
    loadDashboard();
  }

  async function stopBot() {
    await fetch(API + "/bot/stop", { method: "POST" });
    loadDashboard();
  }

  setInterval(() => {
    loadDashboard();
    loadLogs();
  }, 3000);

  loadDashboard();
  loadLogs();
</script>
  
</body>
</html>
